<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GutAngle_Monitor - Enter PIN</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/premium.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .pin-wrapper {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; padding: 20px;
            position: relative; overflow: hidden;
        }
        
        .security-header {
            text-align: center; margin-bottom: 40px; z-index: 2;
        }

        .main-icon-container {
            width: 180px; height: 180px; margin: 0 auto 30px;
            position: relative; padding: 10px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.15) 0%, transparent 70%);
            animation: pulse-glow 3s infinite ease-in-out;
        }

        .main-icon {
            width: 100%; height: 100%; object-fit: cover;
            border-radius: 50%; border: 2px solid var(--accent-green);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .security-title {
            font-size: 2rem; font-weight: 800; letter-spacing: 2px;
            color: white; margin: 0; text-transform: uppercase;
        }

        .security-subtitle {
            font-size: 0.9rem; color: var(--accent-cyan);
            letter-spacing: 4px; text-transform: uppercase;
            margin-top: 10px; opacity: 0.8;
        }

        .pin-display {
            display: flex; gap: 20px; margin-bottom: 50px; z-index: 2;
        }

        .pin-slot {
            width: 20px; height: 20px; border-radius: 4px;
            border: 1px solid var(--accent-green);
            background: rgba(0, 255, 136, 0.05);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .pin-slot.filled {
            background: var(--accent-green);
            box-shadow: 0 0 15px var(--accent-green);
            transform: scale(1.2);
        }

        .pin-slot.filled::after {
            content: ''; position: absolute; inset: -4px;
            border: 1px solid var(--accent-green);
            border-radius: 6px; opacity: 0.5;
        }

        .keypad-grid {
            display: grid; grid-template-columns: repeat(3, 85px);
            gap: 20px; z-index: 2;
        }

        .key-btn {
            height: 85px; display: flex; align-items: center;
            justify-content: center; font-size: 1.8rem; font-weight: 300;
            color: white; cursor: pointer; transition: all 0.2s;
            user-select: none; position: relative;
        }

        .key-btn::before {
            content: ''; position: absolute; inset: 0;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px; transition: all 0.2s;
        }

        .key-btn:hover::before {
            background: rgba(0, 255, 136, 0.1);
            border-color: var(--accent-green);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        .key-btn:active { transform: scale(0.9); }
        .key-btn:active::before { background: var(--accent-green); }

        .key-val { z-index: 1; }

        .key-btn.action { color: var(--accent-green); font-size: 1.4rem; }
        
        .status-msg {
            height: 24px; color: #FF4D4D; font-size: 0.85rem;
            margin-top: 30px; text-transform: uppercase;
            letter-spacing: 1px; z-index: 2;
        }

        .forgot-pin-link {
            margin-top: 30px; font-size: 0.75rem; color: var(--accent-cyan);
            text-decoration: none; text-transform: uppercase; letter-spacing: 2px;
            opacity: 0.6; cursor: pointer; transition: all 0.3s; z-index: 2;
        }
        .forgot-pin-link:hover { opacity: 1; text-shadow: 0 0 10px var(--accent-cyan); }

        /* Recovery Overlay */
        .recovery-overlay {
            position: fixed; inset: 0; background: rgba(5, 5, 16, 0.95);
            display: none; flex-direction: column; align-items: center;
            justify-content: center; z-index: 10; backdrop-filter: blur(10px);
        }
        .recovery-card {
            width: 100%; max-width: 400px; padding: 40px;
            border: 1px solid var(--accent-green); background: rgba(0, 255, 136, 0.02);
            text-align: center;
        }
        .recovery-input {
            width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--accent-green);
            padding: 15px; color: white; margin: 20px 0; font-family: inherit;
            text-align: center; letter-spacing: 4px; text-transform: uppercase;
        }
        .btn-recover {
            width: 100%; background: var(--accent-green); color: black;
            border: none; padding: 15px; font-weight: 700; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .btn-cancel {
            margin-top: 20px; color: var(--accent-cyan); cursor: pointer;
            font-size: 0.7rem; text-transform: uppercase; opacity: 0.6;
        }

        .scan-line { }
    </style>
</head>
<body>
<div class="pin-wrapper">
    <div class="decryption-bg" id="decryption-bg"></div>
    <div class="scan-line"></div>
    
    <div class="security-header">
        <div class="main-icon-container">
            <img src="{{ url_for('static', filename='img/icon.png') }}" alt="GutAngle" class="main-icon">
        </div>
        <h1 class="security-title glow-text">GUTANGLE</h1>
        <div class="security-subtitle">Secure Access Point</div>
    </div>

    <div class="pin-display" id="pin-display">
        <div class="pin-slot" id="d0"></div>
        <div class="pin-slot" id="d1"></div>
        <div class="pin-slot" id="d2"></div>
        <div class="pin-slot" id="d3"></div>
        <div class="pin-slot" id="d4"></div>
        <div class="pin-slot" id="d5"></div>
    </div>

    <div class="keypad-grid">
        <div class="key-btn" onclick="pressKey('1')"><span class="key-val">1</span></div>
        <div class="key-btn" onclick="pressKey('2')"><span class="key-val">2</span></div>
        <div class="key-btn" onclick="pressKey('3')"><span class="key-val">3</span></div>
        <div class="key-btn" onclick="pressKey('4')"><span class="key-val">4</span></div>
        <div class="key-btn" onclick="pressKey('5')"><span class="key-val">5</span></div>
        <div class="key-btn" onclick="pressKey('6')"><span class="key-val">6</span></div>
        <div class="key-btn" onclick="pressKey('7')"><span class="key-val">7</span></div>
        <div class="key-btn" onclick="pressKey('8')"><span class="key-val">8</span></div>
        <div class="key-btn" onclick="pressKey('9')"><span class="key-val">9</span></div>
        <div class="key-btn action" onclick="deleteKey()"><i class="fas fa-backspace key-val"></i></div>
        <div class="key-btn" onclick="pressKey('0')"><span class="key-val">0</span></div>
        <div class="key-btn action" onclick="submitPin()"><i class="fas fa-fingerprint key-val"></i></div>
    </div>

    <div class="status-msg" id="pin-error"></div>
    
    <div class="forgot-pin-link" onclick="toggleRecovery(true)">Forgot PIN?</div>

    <div class="recovery-overlay" id="recovery-overlay">
        <div class="recovery-card">
            <h2 style="color:white; margin-bottom:10px;">RECOVERY_PROTOCOL</h2>
            <p style="color:var(--accent-cyan); font-size:0.7rem; opacity:0.8;">ENTER YOUR PERSONAL ID TO BYPASS PIN AUTH</p>
            <input type="text" id="personal-id-input" class="recovery-input" placeholder="GUT-XXXXXX">
            <button class="btn-recover" onclick="recoverAccess()">VERIFY_IDENTITY</button>
            <div class="btn-cancel" onclick="toggleRecovery(false)">[ ABORT_RECOVERY ]</div>
            <div id="recovery-error" style="margin-top:20px; color:#FF4D4D; font-size:0.7rem;"></div>
        </div>
    </div>
</div>

<script>
let pin = '';
const MAX = 6;

// Create background code matrix
const bg = document.getElementById('decryption-bg');
let matrixText = '';
for(let i=0; i<1000; i++) matrixText += Math.random().toString(36).substring(2, 12) + ' ';
bg.textContent = matrixText;

function pressKey(digit) {
    if (pin.length >= MAX) return;
    pin += digit;
    updateDots();
    if (pin.length === MAX) {
        setTimeout(submitPin, 200);
    }
}

function deleteKey() {
    pin = pin.slice(0, -1);
    updateDots();
    document.getElementById('pin-error').textContent = '';
}

function updateDots() {
    for (let i = 0; i < MAX; i++) {
        document.getElementById('d' + i).classList.toggle('filled', i < pin.length);
    }
}

function submitPin() {
    if (pin.length < MAX) {
        document.getElementById('pin-error').textContent = 'Enter 6 digits';
        return;
    }
    
    const errorEl = document.getElementById('pin-error');
    errorEl.textContent = 'Authenticating...';
    errorEl.style.color = 'var(--accent-cyan)';

    fetch('/verify_pin', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ pin: pin })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            errorEl.textContent = 'Access Granted';
            errorEl.style.color = '#00FF00';
            setTimeout(() => { window.location.href = '/bluetooth'; }, 500);
        } else {
            errorEl.textContent = 'Identity Verification Failed';
            errorEl.style.color = '#FF8800';
            const display = document.getElementById('pin-display');
            display.style.animation = 'shake 0.4s';
            setTimeout(() => { display.style.animation = ''; pin = ''; updateDots(); }, 400);
        }
    });
}

function toggleRecovery(show) {
    document.getElementById('recovery-overlay').style.display = show ? 'flex' : 'none';
    if (!show) {
        document.getElementById('recovery-error').textContent = '';
        document.getElementById('personal-id-input').value = '';
    }
}

function recoverAccess() {
    const personalId = document.getElementById('personal-id-input').value.trim();
    if (!personalId) {
        document.getElementById('recovery-error').textContent = 'Personal ID Required';
        return;
    }

    const errorEl = document.getElementById('recovery-error');
    errorEl.textContent = 'Verifying ID...';
    errorEl.style.color = 'var(--accent-cyan)';

    fetch('/verify_id', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ personal_id: personalId })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            errorEl.textContent = 'Identity Verified. Access Granted.';
            errorEl.style.color = '#00FF00';
            setTimeout(() => { window.location.href = '/bluetooth'; }, 1000);
        } else {
            errorEl.textContent = 'Invalid Personal ID';
            errorEl.style.color = '#FF4D4D';
        }
    });
}

document.addEventListener('keydown', function(e) {
    if (document.getElementById('recovery-overlay').style.display === 'flex') {
        if (e.key === 'Escape') toggleRecovery(false);
        else if (e.key === 'Enter') recoverAccess();
        return;
    }
    if (e.key >= '0' && e.key <= '9') pressKey(e.key);
    else if (e.key === 'Backspace') deleteKey();
    else if (e.key === 'Enter') submitPin();
});
</script>
</body>
</html>
