<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GutAngle | Session Logs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/premium.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .history-layout {
            display: grid;
            grid-template-columns: 200px 1fr;
            height: 100vh;
            overflow: hidden;
            transition: grid-template-columns 0.3s ease;
        }

        .history-layout.collapsed {
            grid-template-columns: 70px 1fr;
        }

        .history-sidebar {
            background: rgba(0, 0, 0, 0.4);
            border-right: 1px solid rgba(0, 242, 255, 0.1);
            padding: 30px 10px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            overflow: hidden;
            white-space: nowrap;
        }

        .history-nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-link {
            padding: 12px 15px;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .nav-link:hover, .nav-link.active {
            color: #00F2FF;
            background: rgba(0, 242, 255, 0.05);
            border-left: 2px solid #00F2FF;
        }

        .collapsed .nav-link span, .collapsed .history-sidebar span {
            display: none;
        }

        .collapsed .nav-link {
            justify-content: center;
            padding: 12px 0;
            border-left: none;
        }

        .history-main {
            padding: 40px;
            overflow-y: auto;
        }

        .log-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
            margin-top: 30px;
        }

        .log-table th {
            text-align: left;
            font-size: 0.6rem;
            color: #00F2FF;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 0 20px;
            opacity: 0.6;
        }

        .log-row {
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.3s ease;
        }

        .log-row:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(5px);
        }

        .log-row td {
            padding: 15px 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.8);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-row td:first-child { border-left: 1px solid rgba(255, 255, 255, 0.05); }
        .log-row td:last-child { border-right: 1px solid rgba(255, 255, 255, 0.05); }

        .status-tag {
            font-size: 0.6rem;
            padding: 3px 8px;
            background: rgba(0, 242, 255, 0.1);
            color: #00F2FF;
            border: 1px solid rgba(0, 242, 255, 0.2);
            font-weight: 700;
        }

        .status-tag.active {
            background: rgba(0, 255, 0, 0.1);
            color: #00FF00;
            border-color: rgba(0, 255, 0, 0.2);
        }
    </style>
</head>
<body class="medical-theme">
    <div class="scan-line"></div>

    <div class="history-layout">
        <aside class="history-sidebar">
            <div style="display: flex; align-items: center; gap: 10px;">
                <img src="{{ url_for('static', filename='img/icon.png') }}" width="30" height="30">
                <span style="font-size: 0.8rem; letter-spacing: 2px; font-weight: 900;">GUTANGLE</span>
            </div>

            <nav class="history-nav">
                <a href="/dashboard" class="nav-link"><i class="fas fa-home"></i> NEXUS_CORE</a>
                <a href="/history" class="nav-link active"><i class="fas fa-history"></i> SESSION_LOGS</a>
                <a href="/settings" class="nav-link"><i class="fas fa-cog"></i> SYSTEM_CONFIG</a>
            </nav>

            <div style="margin-top: auto;">
                <a href="/logout" class="nav-link" style="color: #FF003C;"><i class="fas fa-power-off"></i> TERMINATE_SESSION</a>
            </div>
        </aside>

        <main class="history-main">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px;">
                <div style="display: flex; align-items: center; gap: 20px;">
                    <button id="sidebar-toggle" class="glass-panel" style="padding: 10px; font-size: 1rem;"><i class="fas fa-bars"></i></button>
                    <div>
                        <h2 class="hud-header" style="font-size: 1.5rem; margin: 0;">SESSION_LOGS</h2>
                        <p style="font-size: 0.65rem; opacity: 0.4; margin: 5px 0 0 0;">RETR_ARCHIVED_DATA_STREAMS: SUCCESS</p>
                    </div>
                </div>
                <button class="glass-panel" style="padding: 10px 20px; font-size: 0.65rem;" onclick="location.reload()">REFRESH_INDEX</button>
            </div>

            <table class="log-table">
                <thead>
                    <tr>
                        <th>TIMESTAMP</th>
                        <th>SESSION_ID</th>
                        <th>DURATION</th>
                        <th>STATUS</th>
                        <th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="session-rows">
                    <!-- Dynamic -->
                </tbody>
            </table>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const layout = document.querySelector('.history-layout');
            const toggleBtn = document.getElementById('sidebar-toggle');
            
            if (localStorage.getItem('sidebar-collapsed') === 'true') {
                layout.classList.add('collapsed');
            }
            
            if (toggleBtn) {
                toggleBtn.addEventListener('click', () => {
                    layout.classList.toggle('collapsed');
                    localStorage.setItem('sidebar-collapsed', layout.classList.contains('collapsed'));
                });
            }
        });

        fetch('/api/sessions')
            .then(res => res.json())
            .then(sessions => {
                const container = document.getElementById('session-rows');
                if (!sessions || sessions.length === 0) {
                    container.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 100px; opacity: 0.3;">NO_SESSIONS_RECORDED</td></tr>`;
                    return;
                }

                container.innerHTML = sessions.map(s => `
                    <tr class="log-row">
                        <td style="font-family: monospace;">${new Date(s.start_time).toLocaleString()}</td>
                        <td style="font-family: monospace; font-size: 0.7rem; opacity: 0.5;">${s.session_id}</td>
                        <td>${s.end_time ? calculateDuration(s.start_time, s.end_time) : 'STREAMING'}</td>
                        <td><span class="status-tag ${s.status === 'active' ? 'active' : ''}">${s.status.toUpperCase()}</span></td>
                        <td><button class="glass-panel" style="padding: 5px 12px; font-size: 0.6rem;">VIEW_TRACE</button></td>
                    </tr>
                `).join('');
            });

        function calculateDuration(start, end) {
            const diff = new Date(end) - new Date(start);
            const hours = Math.floor(diff / 3600000);
            const minutes = Math.floor((diff % 3600000) / 60000);
            return `${hours}h ${minutes}m`;
        }
    </script>
</body>
</html>
